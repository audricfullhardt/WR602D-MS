name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Create .env
        run: |
          echo "APP_ENV=test" > .env
          echo "APP_SECRET=ci-secret" >> .env
          echo "APP_SHARE_DIR=var/share" >> .env
          echo "DEFAULT_URI=http://localhost" >> .env
          echo "MAILER_DSN=null://null" >> .env
          echo "MAILER_NO_REPLY_EMAIL=noreply@test.fr" >> .env
          echo "MAILER_FROM_NAME=Test" >> .env
          echo "API_KEY_HEADER=X-API-KEY" >> .env
          echo "API_KEY_VALUE=test-secret" >> .env
          echo "CORS_ALLOW_ORIGIN='^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'" >> .env
          echo "CORS_BACK_URL='^https?://back\.minigolf\.local(:[0-9]+)?$'" >> .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: php bin/phpunit

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/minigolf/mailer
            git pull origin main
            cd /var/www/minigolf
            docker compose build mailer
            docker compose up -d --no-deps mailer
